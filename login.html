<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARWallet Login</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f2f2f2;
}

.container{
padding:20px;
}

.title{
font-size:32px;
font-weight:bold;
margin-top:20px;
}

.input-box{
background:#eee;
border-radius:10px;
padding:12px;
margin-top:10px;
margin-bottom:20px;
}

input{
width:100%;
border:none;
background:none;
outline:none;
font-size:16px;
}

.login-btn{
width:100%;
padding:14px;
background:#FFC107;
border:none;
border-radius:8px;
font-size:18px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<div class="title">Account Login</div>

<label>Phone Number</label>

<div class="input-box">
<input type="text" id="phone" placeholder="Enter phone number">
</div>

<label>Password</label>

<div class="input-box">
<input type="password" id="pass" placeholder="Enter password">
</div>

<button class="login-btn" id="loginBtn">Log In</button>

</div>

<script>

document.getElementById("loginBtn").addEventListener("click",function(){

var phone=document.getElementById("phone").value;
var pass=document.getElementById("pass").value;

if(phone=="" || pass==""){
alert("Enter phone and password");
return;
}

window.location.href="index.html";

});

</script>

</body>
</html>
