<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
}

.container{
padding:20px;
}

.title{
font-size:30px;
font-weight:bold;
margin-top:20px;
}

.input{
background:#eee;
padding:12px;
border-radius:8px;
margin-top:10px;
margin-bottom:20px;
}

input{
width:100%;
border:none;
background:none;
outline:none;
font-size:16px;
}

button{
width:100%;
padding:14px;
background:#FFC107;
border:none;
border-radius:8px;
font-size:18px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<div class="title">Account Login</div>

<div class="input">
<input type="text" id="phone" placeholder="Phone number">
</div>

<div class="input">
<input type="password" id="pass" placeholder="Password">
</div>

<button onclick="login()">Log In</button>

</div>

<script>

function login(){

var phone=document.getElementById("phone").value;
var pass=document.getElementById("pass").value;

if(phone=="" || pass==""){
alert("Enter phone and password");
return;
}

localStorage.setItem("login","true");

window.location.href="index.html";

}

</script>

</body>
</html>
