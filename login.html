<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ARWallet Login</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f2f2f2;
}

.container{
padding:20px;
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.title{
font-size:34px;
font-weight:bold;
margin-bottom:20px;
}

label{
font-size:14px;
color:#666;
}

.input-box{
background:#eee;
border-radius:10px;
padding:12px;
margin-top:8px;
margin-bottom:20px;
display:flex;
align-items:center;
gap:10px;
}

input{
border:none;
background:none;
outline:none;
flex:1;
font-size:16px;
}

.login-btn{
width:100%;
padding:14px;
background:#FFC107;
border:none;
border-radius:8px;
font-size:18px;
font-weight:bold;
margin-top:10px;
}

.help-btn{
width:100%;
padding:14px;
background:#ddd;
border:none;
border-radius:8px;
margin-top:10px;
font-size:16px;
}

.register{
text-align:center;
margin-top:20px;
}

.register span{
color:#FFC107;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<div class="top">
<div></div>
<div>🌐 English</div>
</div>

<div class="title">
Account Login
</div>

<label>Phone Number</label>

<div class="input-box">

<span style="font-size:20px">🇮🇳</span>

<span>+91</span>

<input type="text" id="phone" placeholder="Please enter your phone number">

</div>

<label>Password</label>

<div class="input-box">

<input type="password" id="pass" placeholder="Please enter your login password">

</div>

<div style="text-align:right;color:#FFC107;font-size:14px">
Forgot Password?
</div>

<button class="login-btn" onclick="login()">
Log In
</button>

<button class="help-btn">
Help Center
</button>

<div class="register">
No Account? <span>Register Now »</span>
</div>

</div>

<script>

function login(){

var phone=document.getElementById("phone").value;
var pass=document.getElementById("pass").value;

if(phone=="" || pass==""){
alert("Enter phone and password");
return;
}

localStorage.setItem("login","true");

window.location.href="index.html";

}

</script>

</body>
</html>
