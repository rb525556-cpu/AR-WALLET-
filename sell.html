<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sell ARB</title>

<style>

body{
background:#f5f5f5;
font-family:Arial;
margin:0;
}

.header{
background:white;
padding:15px;
font-size:20px;
font-weight:bold;
color:#FFC107;
}

.balance{
background:white;
margin:10px;
padding:15px;
border-radius:10px;
}

.sellbtn{
width:90%;
margin:20px auto;
display:block;
padding:15px;
background:#FFC107;
border:none;
border-radius:8px;
font-size:18px;
font-weight:bold;
}

.menu{
display:flex;
justify-content:space-around;
margin-top:20px;
}

.menu div{
background:white;
padding:10px 20px;
border-radius:8px;
}

</style>

</head>

<body>

<div class="header">
Sell ARB
</div>

<div class="balance">

<p>Available Balance: <b>2.00 ARB</b></p>

<p>Sell Balance: 0.00 ARB</p>

<p>In Progress: 0.00 ARB</p>

</div>

<button class="sellbtn" onclick="sell()">Sell ARB</button>

<div class="menu">

<div>Collection</div>
<div>Customer Service</div>

</div>

<script>

function sell(){

let pin=prompt("Enter 4 digit PIN");

if(pin=="1234"){

alert("Sell Request Submitted");

}
else{

alert("Wrong PIN");

}

}

</script>

</body>
</html>
